name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"   # runs daily at 04:00 UTC
  workflow_dispatch:       # allow manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout private repo (where workflow + today.py live)
      - name: Checkout private repo
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Get Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      # 3. Cache pip dependencies
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      # 5. Run your private script (today.py)
      - name: Run update script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      # 6. Push results (README) to your PUBLIC repo
      - name: Commit README changes
        run: |
          cd public-repo || echo "Using root directory"
          git add .
          git diff
          git config --global user.email "182692924+AnujYadav-Dev@users.noreply.github.com"
          git config --global user.name "AnujYadav-dev/GitHub-Actions-Bot"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/AnujYadav-Dev/AnujYadav-Dev.git HEAD:main
