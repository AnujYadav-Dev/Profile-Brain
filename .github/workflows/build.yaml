name: README build
on:
  schedule:
    # Runs every Monday at 7:00 AM IST
    - cron: '30 1 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4  

      - name: Get Python 3.12
        uses: actions/setup-python@v5  
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Clone target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TARGET_REPO || format('{0}/{0}', github.repository_owner) }}
          token: ${{ secrets.ACCESS_TOKEN }}
          path: target-repo

      - name: Run update script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ vars.USER_NAME || github.repository_owner }}
          BIRTH_DATE: ${{ vars.BIRTH_DATE }}
          DARK_SVG_PATH: ${{ vars.DARK_SVG_PATH || 'dark_mode.svg' }}
          LIGHT_SVG_PATH: ${{ vars.LIGHT_SVG_PATH || 'light_mode.svg' }}
          CACHE_DIR: ${{ vars.CACHE_DIR || 'cache' }}
        run: |
          cd target-repo
          python ../main.py

      - name: Commit README changes
        run: |
          cd target-repo
          git add .
          git diff
          git config --global user.name "${{ vars.COMMIT_AUTHOR_NAME || 'github-actions[bot]' }}"
          git config --global user.email "${{ vars.COMMIT_AUTHOR_EMAIL || '41898282+github-actions[bot]@users.noreply.github.com' }}"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
